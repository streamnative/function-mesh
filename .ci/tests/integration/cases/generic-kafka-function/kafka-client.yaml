apiVersion: v1
kind: ConfigMap
metadata:
  name: generic-kafka-client-config
  namespace: default
data:
  kafka.properties: |
    security.protocol=PLAINTEXT
---
apiVersion: v1
kind: Pod
metadata:
  name: kafka-client
  namespace: default
spec:
  containers:
  - name: kafka
    image: bitnamilegacy/kafka:3.4.1
    command: ["/bin/sh", "-c", "--"]
    args: ["while true; do sleep 30; done;"]
    volumeMounts:
    - name: config-volume
      mountPath: /opt/bitnami/kafka/config/kafka.properties
      subPath: kafka.properties
      readOnly: true
  volumes:
  - name: config-volume
    configMap:
      name: generic-kafka-client-config
